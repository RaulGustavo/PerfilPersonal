<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form</title>
    </head>
    <body>
        <form id="Miformulario">
            <label>Nombre</label>
            <input type="text" name="Minombre" required><br><br>
            <label>Email</label>
            <input type="email" name="Micorreo" required><br>
            <p>Género</p>
            <input type="radio" name="Migenero" value="Hombre" required>
            <label>Hombre</label><br>
            <input type="radio" name="Migenero" value="Mujer" required>
            <label>Mujer</label>
            <br><br>
            <button type="submit">Enviar</button>
        </form>

        <div id="resultado" style="margin-top: 20px; color: blue"></div>

        <script>
            const formulario = document.getElementById("Miformulario");
            const visor = document.getElementById("resultado");

            // Escuchamos el evento 'submit'
            formulario.addEventListener("submit", function (event) {
                // 1. EVITAMOS que la página se recargue (comportamiento por defecto)
                event.preventDefault();

                // 2. CAPTURAMOS los datos usando FormData
                const datos = new FormData(formulario);
                const nombre = datos.get("Minombre"); // 'Minombre' es el NAME del input
                const email = datos.get("Micorreo");
                const genero = datos.get("Migenero");

                // 3. MOSTRAMOS el resultado en el HTML
                visor.innerText =
                "Nombre: " + nombre +
                "\nCorreo: " + email +
                "\nGénero: " + genero;

            });
        </script>
    </body>
</html>
